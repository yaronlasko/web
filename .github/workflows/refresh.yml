name: Refresh predictions

# Re-runs the exact terminal pipeline (standings -> fetch -> predict) in the cloud
# and redeploys the site to GitHub Pages.
#   * workflow_dispatch = the manual "Re-predict" button (Actions tab -> Run workflow)
#   * schedule          = automatic hourly refresh during the tournament (Jun-Jul)
#   * push to main      = redeploy when you edit the site or pipeline
on:
  workflow_dispatch:
    # GitHub's shared scheduler delays/DROPS scheduled runs under load, and the top
    # of the hour (minute 0) is the most congested slot — so a plain hourly "0 * * * *"
    # in practice fired every 1–5h (observed gaps up to 5.5h => the site read ">1h ago").
    # Fix: run THREE times an hour at OFF-PEAK minutes. Even if GitHub drops 2 of the 3,
    # the site still refreshes well within the hour. Rest-day runs just re-publish the
    # same data (harmless). After the final, delete this schedule.
    - cron: "9,29,49 * * 6,7 *"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time. With hourly + push triggers, runs can overlap; cancel a
# superseded run instead of letting GitHub fail the queued deploy (we always want
# the latest data live, so cancelling an outdated in-flight run is correct here).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install numpy requests

      # 1. fold finished games' results into the standings (re-derived from the
      #    committed 2026-06-25 baseline + ledger each run, so it can't double-count).
      #    Network-dependent -> tolerate a transient Polymarket API hiccup.
      - name: Fold in results (standings)
        run: python -m src.worldcup_standings
        continue-on-error: true

      # 2. refresh the live Polymarket market odds
      - name: Refresh market odds (fetch)
        run: python -m src.worldcup_fetch
        continue-on-error: true

      # 3. re-predict -> regenerates web/data.js + web/data.json (uses the existing
      #    market.json if step 2 was skipped, so this always produces a site)
      - name: Re-predict (build site data)
        run: python -m src.worldcup_predict

      # Force the Pages source to "GitHub Actions" (build_type=workflow). If Pages
      # ever gets switched to "Deploy from a branch" in Settings, deploy-pages can't
      # publish and the branch-builder serves the (index-less) repo root -> 404.
      # This self-heals it each run so it can't silently revert.
      - name: Ensure Pages source = GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /tmp/pages.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          echo "PUT /pages build_type=workflow -> HTTP $code"; cat /tmp/pages.json 2>/dev/null || true
          if [ "$code" = "404" ]; then
            echo "No Pages site yet; creating it with build_type=workflow…"
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"workflow"}'
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
